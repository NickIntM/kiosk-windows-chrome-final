<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Φωτογραφία</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;   /* γεμίζει όλη την οθόνη, κόβει αν χρειαστεί */
      object-position: center;
    }
  </style>
</head>
<body>
  <!-- Άλλαξε το "photo.jpg" με το πραγματικό όνομα της φωτογραφίας σου -->
  <img src="photos/photov.png" alt="Φωτογραφία">
</body>
</html>
